objective_ids:
- 115
- 73
- 111
- 181
- 135
nearby:
  include: false
# Train-served backpack: D&SNG to Needleton, Chicago Basin + Ruby Basin camps,
# camp move over Twin Thumbs Pass. One recommended route per LEG (Kyle, 2026-07-10):
# pack-in + each climbing day FROM CAMP + camp move + pack-out (pack-in and pack-out
# use different drainages here, so both get lines). Climbing days + move are verbatim
# recorded tracks — days 2/3 from-camp (upper Ruby meadow ~11,640, where the tracks
# converge between the Monitor/Animas cirque and the Pigeon–Turret saddle); legs are
# Kyle's 2013 recordings of this exact itinerary (kyle13_*.gpx, exported from CalTopo).
days:
- {label: "Jupiter", objective_ids: [115], track: "trk_pb_2"}
- {label: "Pigeon + Turret", objective_ids: [73, 111], track: "06AR6BF_pigeon-turret"}
- {label: "Monitor group (optional)", objective_ids: [181, 135], track: "trk_loj_16157"}
legs:
- {label: "Pack-in", track: "kyle13_needleton_approach"}
- {label: "Camp move", track: "kyle13_chicago_ruby_move"}
# Pack-out is COMPOSED (Kyle's 2013 hike-out GPS started ~1.5 mi below camp):
# point-to-point Needleton → camp waypoint via recorded tracks.
- {label: "Pack-out", target: "packout_target_peaks_only.gpx", start: "37.6335,-107.6928"}
landmarks:
- name: Needleton (D&SNG train stop / Animas footbridge)
  lat: 37.6335
  lon: -107.6928
  kind: trailhead
  ele_ft: 8270
