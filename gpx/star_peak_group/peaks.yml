# Waypoint config — Star + Taylor day trip from Mt Tilton Trail TH.
#
# Italian Mtn was originally bundled here (2026-06-07 draft), but Italian is
# climbed from a completely different trailhead — the Cement Creek TH off CR 740
# in Gunnison County (per climb13ers standard-route description; ~5 mi SE of
# Tilton on separate road system). Bundling it with Star+Taylor was
# geographically wrong. Italian gets its own report — see
# [[project-report-stat-drift]] backlog. (Kyle, 2026-07-22.)
objective_ids: [301, 365]        # Star Pk A (301), Taylor Pk A (365)

days:
  - {label: "Star + Taylor", objective_ids: [301, 365]}

nearby:
  include: false

landmarks:
  - {name: "Mt Tilton Trail TH (end of CO 742)", lat: 38.9872, lon: -106.7573, ele_ft: 10750, kind: trailhead}
