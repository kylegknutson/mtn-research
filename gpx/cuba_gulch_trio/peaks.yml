# Waypoint config — Cuba Gulch trio (PT 13,076 + PT 13,003 + PT 13,179).
# All three are ranked San Juan 13ers in peak_db. (PT 13,003 = id 822; its
# coordinates were backfilled in peak_db on 2026-06-09, so it's a normal
# objective now — no extra_summits workaround needed.)
objective_ids: [752, 822, 639]   # PT 13,076 (752), PT 13,003 (822), PT 13,179 (639)
# Route composed from the MINNIE GULCH approach (SW) — the intended trailhead
# (Kyle, 2026-07-12). The prior from_track recipe followed a Cuba-Gulch-TH (NE)
# track that started ~3 mi off and on the wrong side; graph-composed from the
# Minnie Gulch TH landmark below via --start auto.
route_build: {method: graph}

nearby:
  include: false

landmarks:
- {name: "Minnie Gulch TH (CR 24, upper)", lat: 37.8414, lon: -107.5489, ele_ft: 11046, kind: trailhead}
summit_overrides:
  639: {lat: 37.84754, lon: -107.47521, note: 'track summit (11 trk); peak_db was ~116 ft off, ~16 ft low'}
