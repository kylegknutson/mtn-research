# PT 13,290 + PT 13,274 + PT 13,022 — the three unclimbed ranked 13ers around
# Rio Grande Pyramid (Weminuche Wilderness), in one push from the Weminuche Trail TH.
objective_ids:
- 517   # PT 13,290 ("Fools Pyramid")
- 532   # PT 13,274
- 804   # PT 13,022
# The recorded line deliberately crosses Rio Grande Pyramid's summit between PTs.
pass_over_summits: [120]
# trk_14ers_3 tours all three summits AND starts at the Weminuche Trail TH
# (Thirtymile) — the honest full-approach line. The prior trk_14ers_4 started
# ~6.6 mi in (from a backpack camp), omitting the long approach (Kyle, 2026-07-12).
route_build: {method: from_track, track: "trk_14ers_3"}
nearby:
  include: false
landmarks:
- name: Weminuche Trail TH (Thirtymile, Rio Grande Reservoir)
  lat: 37.7233
  lon: -107.259
  kind: trailhead
  ele_ft: 9300
summit_overrides:
  532: {lat: 37.69657, lon: -107.36886, note: 'track summit (6 trk); peak_db was ~77 ft off, ~10 ft low'}
