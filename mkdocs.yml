site_name: Kyle's Peak Research
site_description: Colorado peak research notes — routes, link-ups, conditions, trip reports
site_url: https://kylegknutson.github.io/mtn-research/
site_author: Kyle Knutson

repo_url: https://github.com/kylegknutson/mtn-research
repo_name: kylegknutson/mtn-research
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  favicon: assets/favicon.png
  logo: assets/favicon.png
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Peak Map: peak-map.md
  - Architecture: architecture.md
  - Peaks:
    - Brown Mountain: peaks/brown_mountain.md
    - Dolores + Middle Peak: peaks/dolores_middle_peak.md
    - Telluride Peak Group: peaks/telluride_t7_t8.md
    - Hunts Peak: peaks/hunts_peak.md
    - PT 13,557 (Huerfano): peaks/pt_13557.md
    - Crestolita + Broken Hand: peaks/crestolita_broken_hand.md
    - Jacque Peak: peaks/jacque_peak.md
    - Pennsylvania Mountain: peaks/pennsylvania_mountain.md
    - Homestake Peak: peaks/homestake_peak.md
    - Savage Peak: peaks/savage_peak.md
    - Pearl + Oyster: peaks/pearl_oyster.md
    - Sunshine Mtn + PT 13,094: peaks/sunshine_13094.md
    - Cuba Gulch Trio (13,076/13,003/13,179): peaks/cuba_gulch_trio.md
    - Chief Mtn A (13,019, Weminuche): peaks/chief_mtn_a.md
    - South River Peak (13,156, Weminuche): peaks/south_river_peak.md
    - Trinchera Group (Trinchera/Cuatro/Maxwell): peaks/trinchera_group.md
    - Chipeta Mountain: peaks/chipeta_mtn.md
    - Mount Powell + Eagles Nest: peaks/powell_eagles_nest.md
    - PT 13,155 Group: peaks/pt_13155_group.md
    - Grizzly E + Jenkins + 13,145 (Sawatch): peaks/grizzly_jenkins_group.md
    - Lake Fork Pk (13,333, Sawatch): peaks/lake_fork_peak.md
    - La Plata + PT 13,222 (Ellingwood Ridge): peaks/la_plata_13222.md
    - Fairview Peak (13,224, Gold Basin): peaks/fairview_peak.md
    - Henry Mountain (13,272, Gold Basin): peaks/henry_mountain.md
    - Williams Mountains Traverse (5 × Sawatch): peaks/williams_mountains.md
    - Wayah Group (6 × Sawatch ridge): peaks/wayah_group.md
    - Cimarron Remaining Six (Coxcomb area): peaks/cimarron_six.md
    - Rio Grande Pyramid Three (Weminuche): peaks/rio_grande_pyramid_three.md
    - Campbell Creek Pk (Grizzly Gulch): peaks/campbell_creek_pk.md
    - Mount Adams Trio (Sangre): peaks/mount_adams_trio.md
    - Baldy Lejos Trio (La Garita / W Willow): peaks/baldy_lejos_trio.md
    - PT 13,308 + 13,166 (La Garita / W Willow): peaks/pt_13308_13166.md
    - PT 13,408 + 13,026 (La Garita / Cochetopa): peaks/pt_13026_13408.md
    - Carter Dome Group (NH): peaks/carter_dome_group.md
  - Trips:
    - Star Peak Group 2-Day (Star+Taylor+Italian): trips/star_peak_group.md
    - Cimarron / Coxcomb (8 peaks): trips/cimarron_coxcomb.md
    - West Willow La Garita 2-Day (5 peaks / San Luis Pass): trips/west_willow_la_garita.md
    - South San Juans 3-Day (Bennett/Conejos/Summit Group): trips/south_san_juans_3day.md
  - Lists:
    - Closest unclimbed Sangre 13ers: lists/2026-06-02_closest-unclimbed-sangre-13ers.md
  - Methodology:
    - Overview: methodology/index.md
    - Source requirements: methodology/source-requirements.md
    - 'Access: Culebra / Cielo Vista': methodology/access-culebra-cielo-vista.md
    - CalTopo + PNG pipeline: methodology/caltopo-pipeline.md
    - Report template: methodology/report-template.md
    - Site conventions: methodology/conventions.md
    - Improvement plan: methodology/improvement-plan.md
    - Automation roadmap: methodology/automation-roadmap.md
    - 'Workflow: Narrow-down': methodology/workflows/narrow-down.md
    - 'Workflow: Single-peak report': methodology/workflows/single-peak-report.md
    - 'Workflow: Day-trip report': methodology/workflows/day-trip-report.md
    - 'Workflow: Multi-day trip report': methodology/workflows/multi-day-trip-report.md

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

# Keep climber-specific + skeleton files off Kyle's site (peak slugs have no dot,
# so a second dot ⇒ a <slug>.<climber>.md / .skeleton.md / index.<climber>.md file).
exclude_docs: |
  /index.*.md
  peaks/*.*.md

extra_css:
  - https://unpkg.com/leaflet@1.9.4/dist/leaflet.css
  - stylesheets/peak-map.css?v=4
  - stylesheets/report-stats.css?v=1
  - stylesheets/admonitions.css?v=1

extra_javascript:
  - javascripts/external-links-new-tab.js
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - https://unpkg.com/tablesort@5.3.0/dist/sorts/tablesort.number.min.js
  - javascripts/tablesort.js
  - https://unpkg.com/leaflet@1.9.4/dist/leaflet.js
  - javascripts/peak-map.js?v=4
  - javascripts/nav-stats.js?v=1

# Don't fail builds on minor link issues — research notes have lots of external refs
strict: false
